<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https: http: file:;">
  <title>huasMD</title>
</head>
<body>
  <div id="titlebar">
    <div id="agent-dot"></div>
    <!-- Right-aligned icon group (kept as a group for layout flexibility) -->
    <div id="titlebar-tools">
      <button id="slides-btn" class="tb-icon-btn" data-i18n-title="slides.open">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button id="toc-btn" class="tb-icon-btn" data-i18n-title="toc.title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <div id="editor"></div>
  <textarea id="source-editor" spellcheck="false"></textarea>

  <!-- TOC outline panel (overlay, does not push editor) -->
  <div id="toc-panel" class="hidden">
    <div class="toc-header" data-i18n="toc.title">Outline</div>
    <div id="toc-list"></div>
  </div>

  <!-- Bottom status bar (replaces native menu bar) -->
  <div id="statusbar">
    <!-- Left group: direct high-frequency actions -->
    <div class="sb-group">
      <button class="sb-btn" data-action="new" data-i18n-title="action.new">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      </button>
      <button class="sb-btn" data-action="open" data-i18n-title="action.open">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button class="sb-btn" data-action="save" data-i18n-title="action.save">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      </button>
    </div>

    <div class="sb-spacer"></div>

    <!-- Right group: popover panels -->
    <div class="sb-group">
      <button class="sb-btn sb-pop" data-pop="theme" data-i18n-title="panel.theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
      </button>
      <button class="sb-btn sb-pop" data-pop="language" data-i18n-title="panel.language">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </button>
      <button class="sb-btn sb-pop" data-pop="export" data-i18n-title="panel.export">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <div class="sb-sep"></div>
      <button id="width-toggle" class="sb-btn" data-i18n-title="width.toggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 8 3 12 7 16"/><polyline points="17 8 21 12 17 16"/><line x1="3" y1="12" x2="21" y2="12"/></svg>
      </button>
    </div>
  </div>

  <!-- Popover panel container (positioned dynamically above the trigger button) -->
  <div id="pop-panel" class="hidden"></div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
